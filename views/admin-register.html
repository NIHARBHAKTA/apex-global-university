<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Secure Gateway - Register</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav>
        <h2>Administrative Gateway</h2>
        <div class="nav-links"><a href="/">Home</a></div>
    </nav>
    <main style="max-width: 500px;">
        <div class="form-container">
            <h3>Create Admin Account</h3>
            <form id="adminRegisterForm">
                <label>Base Username</label>
                <input type="text" id="regUser" required placeholder="Enter base username">
                
                <label>Email Address</label>
                <input type="email" id="regEmail" required placeholder="yourname@gmail.com">

                <label>Phone Number</label>
                <input type="tel" id="regPhone" required placeholder="Enter 10-digit phone number">
                
                <button type="submit" class="btn-submit" style="background:var(--accent);">Register and Email Credentials</button>
            </form>
            <p style="margin-top: 20px; text-align: center; font-size: 14px;">
                Already have credentials? <a href="/admin-login" style="color: var(--success); font-weight: 600;">Login here</a>
            </p>
            <p id="error-msg" style="color:var(--danger); text-align:center; margin-top:15px; font-weight:600; min-height: 20px;"></p>
        </div>
    </main>
    <script src="/js/app.js"></script>
</body>
</html>
