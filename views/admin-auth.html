<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Administrative Secure Gateway</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav>
        <h2>Administrative Gateway</h2>
        <div class="nav-links"><a href="/">Home</a></div>
    </nav>
    <main style="max-width: 950px;">
        <div class="grid" style="grid-template-columns: 1fr 1fr; margin:0; padding:0;">
            
            <div class="form-container" style="padding-right: 30px; border-right: 1px solid #e2e8f0;">
                <h3>Admin Secure Login</h3>
                <form id="adminLoginForm">
                    <label>Emailed Unique Name</label>
                    <input type="text" id="loginUniqueName" required placeholder="e.g., ADMIN-NIHAR-1234">
                    
                    <label>Unique Access Number</label>
                    <input type="password" id="loginAccessNumber" required placeholder="e.g., 54321">
                    
                    <button type="submit" class="btn-submit" style="background:var(--success);">Log Into Portal</button>
                </form>
            </div>

            <div class="form-container" style="padding-left: 30px;">
                <h3>Create Admin Account</h3>
                <form id="adminRegisterForm">
                    <label>Base Username</label>
                    <input type="text" id="regUser" required placeholder="Enter base username">
                    
                    <label>Email Address</label>
                    <input type="email" id="regEmail" required placeholder="yourname@gmail.com">

                    <label>Phone Number</label>
                    <input type="tel" id="regPhone" required placeholder="Enter 10-digit phone number">
                    
                    <button type="submit" class="btn-submit" style="background:var(--accent);">Register and Email Credentials</button>
                </form>
            </div>

        </div>
        <p id="error-msg" style="color:var(--danger); text-align:center; margin-top:25px; font-weight:600; min-height: 20px;"></p>
    </main>
    <script src="/js/app.js"></script>
</body>
</html>
